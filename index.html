<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Modele Ideal</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    input, textarea { display:block; margin:10px 0; padding:8px; width:300px; }
    button { padding:10px 15px; cursor:pointer; }
    .card { border:1px solid #ccc; padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<h1>MonModeleIdeal</h1>

<!-- FORMULAIRE -->
<h2>Créer une annonce</h2>

<input id="titre" placeholder="Titre annonce">
<input id="ville" placeholder="Ville">
<input id="date" placeholder="Date">
<textarea id="description" placeholder="Description"></textarea>

<button onclick="addAnnonce()">Publier</button>

<hr>

<h2>Annonces</h2>
<div id="liste"></div>

<script>
const supabase = supabase.createClient(
  "https://uuguozktbqjgbzvgqods.supabase.co/rest/v1/",
  "sb_publishable_Inh2Cpw689yRabbEPca2_g_Nhe2ArAm"
);

// AJOUTER UNE ANNONCE
async function addAnnonce() {
  const titre = document.getElementById("titre").value;
  const ville = document.getElementById("ville").value;
  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;

  const { error } = await supabase
    .from("annonces")
    .insert([{ titre, ville, date, description }]);

  if (error) {
    alert("Erreur : " + error.message);
  } else {
    alert("Annonce publiée !");
    loadAnnonces();
  }
}

// AFFICHER LES ANNONCES
async function loadAnnonces() {
  const { data } = await supabase
    .from("annonces")
    .select("*")
    .order("created_at", { ascending: false });

  const liste = document.getElementById("liste");
  liste.innerHTML = "";

  data.forEach(a => {
    liste.innerHTML += `
      <div class="card">
        <h3>${a.titre}</h3>
        <p>${a.ville} - ${a.date}</p>
        <p>${a.description}</p>
      </div>
    `;
  });
}

loadAnnonces();
</script>

</body>
</html>
